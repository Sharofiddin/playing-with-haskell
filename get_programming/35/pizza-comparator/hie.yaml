cradle:
  multi:
    - path: "./.stack-work"
      config:
        cradle:
          none:
    - path: "./Setup.hs"
      config:
        cradle:
          direct:
            arguments:
              - "-package"
              - "Cabal"
    - path: "./src"
      config:
        cradle:
          stack:
            component: "pizza-comparator:lib"
    - path: "./app/Main.hs"
      config:
        cradle:
          stack:
            component: "pizza-comparator:exe:pizza-comparator-exe"
    - path: "./test"
      config:
        cradle:
          stack:
            component: "pizza-comparator:test:pizza-comparator-test"
