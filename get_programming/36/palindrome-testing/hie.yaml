cradle:
  multi:
    - path: "./.stack-work"
      config:
        cradle:
          none:
    - path: "./Setup.hs"
      config:
        cradle:
          direct:
            arguments:
              - "-package"
              - "Cabal"
    - path: "./src"
      config:
        cradle:
          stack:
            component: "palindrome-testing:lib"
    - path: "./app/Main.hs"
      config:
        cradle:
          stack:
            component: "palindrome-testing:exe:palindrome-testing-exe"
    - path: "./test"
      config:
        cradle:
          stack:
            component: "palindrome-testing:test:palindrome-testing-test"
